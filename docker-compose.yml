services:
    nginx:
        image: nginx:alpine
        container_name: nginx_gestor
        ports:
            - '${APP_PORT:-8077}:80'
            - '${APP_PORT_SSL:-5445}:443'
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./docker/ssl:/etc/nginx/ssl
        depends_on:
            - php
            - node
        networks:
            - laravel
        restart: always

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: php_gestor
        restart: always
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
            - vendor:/var/www/html/vendor
            - storage_data:/var/www/html/storage
            - bootstrap_cache_data:/var/www/html/bootstrap/cache
        networks:
            - laravel
        environment:
            - APP_ENV=${APP_ENV}
            - APP_DEBUG=${APP_DEBUG}
            - APP_KEY=${APP_KEY}
        command: >
            sh -lc "
            set -e;
            git config --global --add safe.directory /var/www/html;
            composer install --no-interaction --prefer-dist;
            mkdir -p /var/www/html/storage/framework/views /var/www/html/storage/framework/sessions /var/www/html/storage/framework/cache/data /var/www/html/storage/logs /var/www/html/bootstrap/cache;
            touch /var/www/html/storage/logs/laravel.log;
            chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache;
            chmod -R ug+rwX /var/www/html/storage /var/www/html/bootstrap/cache;
            php artisan view:clear >/dev/null 2>&1 || true;
            exec php-fpm
            "

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: queue_gestor
        restart: always
        working_dir: /var/www/html
        depends_on:
            - db
        volumes:
            - .:/var/www/html
            - vendor:/var/www/html/vendor
            - storage_data:/var/www/html/storage
            - bootstrap_cache_data:/var/www/html/bootstrap/cache
        networks:
            - laravel
        environment:
            - APP_ENV=${APP_ENV}
            - APP_DEBUG=${APP_DEBUG}
            - APP_KEY=${APP_KEY}
        command: >
            sh -lc "
            mkdir -p /var/www/html/storage/framework;
            while true; do
              date +%s > /var/www/html/storage/framework/queue-worker-heartbeat;
              php artisan queue:work database --once --sleep=1 --tries=3 --backoff=60 --timeout=90 || true;
              sleep 1;
            done
            "

    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: scheduler_gestor
        restart: always
        working_dir: /var/www/html
        depends_on:
            - db
        volumes:
            - .:/var/www/html
            - vendor:/var/www/html/vendor
            - storage_data:/var/www/html/storage
            - bootstrap_cache_data:/var/www/html/bootstrap/cache
        networks:
            - laravel
        environment:
            - APP_ENV=${APP_ENV}
            - APP_DEBUG=${APP_DEBUG}
            - APP_KEY=${APP_KEY}
        command: >
            sh -lc "
            php artisan schedule:work
            "

    db:
        image: mysql:8.0
        container_name: mysql_gestor
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        ports:
            - "3366:3306"
        volumes:
            - db_data:/var/lib/mysql
        restart: always
        networks:
            - laravel

    node:
        image: node:22-alpine
        container_name: node_gestor
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html:delegated
            - node_modules:/var/www/html/node_modules
        environment:
            - APP_ENV=${APP_ENV}
        command: >
            sh -lc "
            echo 'El valor de APP_ENV es: ${APP_ENV}' &&
            npm install &&
            cd '/var/www/html/maria app' && npm install && cd /var/www/html &&
            if [ '${APP_ENV}' = 'production' ]; then
              npm run build &&
              cd '/var/www/html/maria app' && npm run build && cd /var/www/html;
            else
              npm run dev &
              cd '/var/www/html/maria app' && npm run build && cd /var/www/html && wait;
            fi
            "
        networks:
            - laravel
        restart: always

networks:
    laravel:

volumes:
    vendor:
        driver: local
    node_modules:
        driver: local
    db_data:
        driver: local
    storage_data:
        driver: local
    bootstrap_cache_data:
        driver: local

